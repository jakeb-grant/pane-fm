name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev librsvg2-dev

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Sync icons
        run: bun run sync-icons

      - name: Build release binary
        run: cargo build --release --manifest-path src-tauri/Cargo.toml

      - name: Create tarball
        run: |
          tar -czvf pane-fm-${{ github.ref_name }}-x86_64-linux.tar.gz \
            -C src-tauri/target/release pane-fm

      - name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} *.tar.gz --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
