name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (e.g. v0.1.8)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Sync icons
        run: bun run sync-icons

      - name: Build release binary
        run: bun run tauri build

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          tar -czvf release-artifacts/pane-fm-${{ env.RELEASE_TAG }}-x86_64-linux.tar.gz \
            -C src-tauri/target/release pane-fm
          cp src-tauri/target/release/bundle/deb/*.deb release-artifacts/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/appimage/*.AppImage release-artifacts/ 2>/dev/null || true

      - name: Create or update GitHub Release
        run: |
          gh release create ${{ env.RELEASE_TAG }} release-artifacts/* --generate-notes ||
          gh release upload ${{ env.RELEASE_TAG }} release-artifacts/* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
